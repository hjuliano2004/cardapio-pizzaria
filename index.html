<!DOCTYPE html>
<html lang="pt-Br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cardápio Papadelli</title>
</head>

<body>

    <main id="inicio">

        <section id="previa">

            <button id="btn-fecha-prev">
                <svg id="dupla-esquerda" xmlns="http://www.w3.org/2000/svg" fill="currentColor"
                    class="bi bi-chevron-double-left" viewBox="0 0 16 16">
                    <path fill-rule="evenodd"
                        d="M8.354 1.646a.5.5 0 0 1 0 .708L2.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0" />
                    <path fill-rule="evenodd"
                        d="M12.354 1.646a.5.5 0 0 1 0 .708L6.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0" />
                </svg>
            </button>

            <ul class="dPrev">
                <li><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" fill="green">
                        <path
                            d="M64 96C28.7 96 0 124.7 0 160V352c0 35.3 28.7 64 64 64H576c35.3 0 64-28.7 64-64V160c0-35.3-28.7-64-64-64H64zm0 48h512c8.8 0 16 7.2 16 16V352c0 8.8-7.2 16-16 16H64c-8.8 0-16-7.2-16-16V160c0-8.8 7.2-16 16-16zm256 32a80 80 0 1 0 0 160 80 80 0 1 0 0-160z" />
                    </svg>
                    Dinheiro</li>
                <li><img src="./imagens/pix.png">Pix</li>
                <li><img src="./imagens/elo.png">Elo</li>
                <li><img src="./imagens/visa.png">Visa</li>
                <li><img src="./imagens/mastercard.png">Mastercard</li>
                <li><img src="./imagens/hipercard.png">Hipercard</li>

            </ul>

        </section>

        <header>

            <!--<div id="imagem_destaque"></div>-->

            <img id="imagem_destaque" src="./imagens/pizza.png">

            <h1>Papadelli</h1>
            <div id="endereco">
                <a id="maps" href="https://maps.app.goo.gl/vvwzj1gebsCKTkAu8">
                    Rua Tuiuti, 1270, Iririu, Joinville - SC, 89227-473
                </a>

                <section id="header">


                    <div>
                        <h4>formas de pagamento</h4>
                        <button id="prevPagamentos"><img id="cartao" src="./imagens/cartao.png">
                        </button>
                    </div>
                    <div>
                        <h4>Estimativa de entrega</h4>
                        <p>30min - 40min</p>
                    </div>

                    <div>
                        <h4>Estimativa de retirada</h4>
                        <p>30min</p>
                    </div>

                    <div><!--espaço vazio necessário--></div>


                    <div>
                        <h4>Funcionamento</h4>
                        terça - domingo
                        <p id="funcionamento"></p>
                    </div>
                </section>

            </div>
        </header>

        <ul id="pizzas"></ul>
    </main>

    <section id="sabores">pizza</section>
    <section id="bebidas">bebidas</section>

    <script type="module" src="script.js"></script>
</body>

</html>
